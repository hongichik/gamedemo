<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Game Trí Tuệ - Chào mừng</title>
  <meta name="description" content="Game trí tuệ hấp dẫn giúp rèn luyện trí nhớ và khả năng ngôn ngữ" />
  <meta name="keywords" content="game, trí tuệ, học tập, tiếng việt" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <main class="start-screen">
    <h1>🎆 Chào mừng 🎆</h1>
    <p style="margin-bottom: 24px; color: var(--text-secondary); font-size: 16px;">Hãy nhập tên của bạn để bắt đầu cuộc hành trình thú vị!</p>
    
    <div style="text-align: left; margin-bottom: 20px;">
      <label for="playerName">👤 Họ và tên:</label>
      <input id="playerName" type="text" placeholder="Nhập họ và tên của bạn..." maxlength="50" required />
    </div>
    
    <button id="startBtn" class="btn" type="button">
      <span>🚀 Bắt đầu</span>
    </button>
  </main>

  <script src="start.js"></script>
</body>
</html>
